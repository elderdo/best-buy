<p>Parts List</p>

<input type="text" placeholder="Filter parts..." [(ngModel)]="filterText" />

<select [(ngModel)]="sortBy">
  <option value="name">Sort by Name</option>
  <option value="price">Sort by Price</option>
</select>

<div
  *ngFor="let p of filteredParts"
  (click)="selectPart(p.id)"
  [class.selected]="p.id === selectedId"
>
  {{ p.name }} - ${{ p.price }}
</div>

<!-- Quantity input appears only when a part is selected -->
<div *ngIf="selectedId !== null" class="quantity-box">
  <label>Quantity:</label>
  <input type="number" min="1" [(ngModel)]="quantity" />

  <button (click)="proceedToPurchase()">Proceed to Purchase</button>
</div>
