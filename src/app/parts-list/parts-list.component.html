<p>Parts List</p>

<input type="text" placeholder="Filter parts..." [(ngModel)]="filterText" />

<select [(ngModel)]="sortBy">
  <option value="name">Sort by Name</option>
  <option value="price">Sort by Price</option>
</select>

<div *ngFor="let p of filteredParts">{{ p.name }} - ${{ p.price }}</div>
